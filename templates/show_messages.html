{% for message in messages %}
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    {% if message.tags == 'success' %}
        <script>
            Swal.fire({
                title: "Success",
                text: "{{ message }}",
                icon: "success"
            });
        </script>
    {% endif %}
    {% if message.tags == 'error' %}
        <script>
            Swal.fire({
                title: "Error",
                text: "{{ message }}",
                icon: "error"
            });
        </script>
    {% endif %}
    {% if message.tags == 'warning' %}
        <script>
            Swal.fire({
                title: "Warning",
                text: "{{ message }}",
                icon: "warning"
            });
        </script>
    {% endif %}
    {% if message.tags == 'info' %}
        <script>
            Swal.fire({
                title: "Info",
                text: "{{ message }}",
                icon: "info"
            });
        </script>
    {% endif %}
{% endfor %}
