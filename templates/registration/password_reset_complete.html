{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock title %}
{% block content %}
    <div class="container flex items-center justify-center mx-auto md:h-screen">
        <div class="mx-auto w-3xl border border-gray-300 p-12 rounded-lg shadow-md">
            <h2 class="text-center text-2xl font-semibold mb-3">Password Reset Complete</h2>
            <p>Your password has been set. You may go ahead and log in now.</p>
            <div class="mx-auto text-center mt-6">
                <button class="px-6 py-3 bg-blue-500 text-white rounded-xl"><a
                        href="{% url 'account:my-login' %}">Login</a></button>
            </div>
        </div>
    </div>
{% endblock content %}
